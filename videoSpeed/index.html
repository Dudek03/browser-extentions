<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Video Speed</h2>

        <div class="control-group">
            <div class="value-display">
                <span id="preview">2.0</span><span>x</span>
            </div>
            <input id="slider" type="range" min="0.25" max="4" step="0.25" value="2" />
        </div>

        <button type="button" id="btn">change speed</button>
    </div>
    <script src="main.js"></script>
</body>

</html>
